# FloorPlan3D Model Configuration

model:
  # Base model for fine-tuning
  architecture: "yolov8"
  base_weights: "yolov8m.pt"  # Medium variant — good balance of speed/accuracy
  input_size: 640

  # Detection classes
  classes:
    - wall
    - door
    - window
    - room

  # Segmentation model for walls/rooms
  segmentation:
    architecture: "yolov8m-seg"
    base_weights: "yolov8m-seg.pt"

training:
  # Dataset
  dataset: "cubicasa5k"
  data_dir: "data/cubicasa5k"
  val_split: 0.15
  test_split: 0.05

  # Training hyperparameters
  epochs: 100
  batch_size: 16
  learning_rate: 0.001
  weight_decay: 0.0005
  warmup_epochs: 3
  patience: 15  # Early stopping patience

  # Augmentation
  augmentation:
    hsv_h: 0.015
    hsv_s: 0.7
    hsv_v: 0.4
    degrees: 0  # No rotation — floor plans have fixed orientation
    translate: 0.1
    scale: 0.5
    flipud: 0.0  # No vertical flip — floor plans are oriented
    fliplr: 0.5
    mosaic: 0.0  # Disabled — mosaic doesn't make sense for floor plans

  # Hardware
  device: "auto"  # auto-detect GPU/MPS/CPU
  workers: 8

inference:
  confidence_threshold: 0.5
  iou_threshold: 0.45
  device: "auto"

  # Post-processing
  snap_threshold: 0.1  # Snap wall endpoints within this distance (meters)
  min_wall_length: 0.3  # Ignore wall segments shorter than this (meters)
  min_room_area: 1.0    # Ignore rooms smaller than this (sq meters)

output:
  # Default wall properties
  default_wall_thickness: 0.15
  default_wall_height: 2.7
  default_door_height: 2.1
  default_window_height: 1.2
  default_window_sill_height: 0.9
